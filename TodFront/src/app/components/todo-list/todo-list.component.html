<div class="min-h-screen text-gray-900 dark:text-zinc-100 font-sans transition-colors duration-300"
     [class]="darkMode ? 'bg-zinc-950 dark' : 'bg-gray-50'">
  
  <!-- Navbar -->
  <nav class="sticky top-0 z-10 backdrop-blur-md bg-white/70 dark:bg-zinc-950/70 border-b border-gray-200 dark:border-zinc-800 transition-colors duration-300">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-black dark:bg-white text-white dark:text-black flex items-center justify-center font-bold text-lg transition-colors duration-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <div>
          <h1 class="text-lg font-semibold tracking-tight leading-5">Todo Manager</h1>
          <div class="text-[10px] opacity-70 font-medium tracking-wide uppercase">Angular + Spring Boot</div>
        </div>
      </div>
      <button 
        (click)="toggleTheme()"
        class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors focus:outline-none focus:ring-2 focus:ring-zinc-400"
        aria-label="Toggle Theme">
        <svg *ngIf="darkMode" class="w-5 h-5 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <svg *ngIf="!darkMode" class="w-5 h-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-3xl mx-auto px-4 sm:px-6 py-12 w-full">
    
    <!-- Error banner -->
    <div *ngIf="errorMessage"
         class="mb-6 rounded-xl px-4 py-3 flex items-center justify-between bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900 text-red-700 dark:text-red-200 transition-colors duration-300">
      <span class="text-sm font-medium">{{ errorMessage }}</span>
      <button (click)="errorMessage=''" class="text-sm underline opacity-80 hover:opacity-100 font-medium transition-opacity">Dismiss</button>
    </div>

    <!-- Header Area -->
    <header class="mb-10 flex items-end justify-between">
      <div>
        <h2 class="text-3xl font-bold tracking-tight mb-2">Good morning</h2>
        <p class="text-gray-500 dark:text-zinc-400 text-sm font-medium transition-colors duration-300">Here's what you need to focus on today.</p>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-sm font-medium text-gray-500 dark:text-zinc-400 opacity-70 transition-colors duration-300">{{ todos.length }} total</span>
        <button
          (click)="loadTodos()"
          class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-zinc-800 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-zinc-400 text-gray-600 dark:text-zinc-400"
          aria-label="Refresh">
          <svg [class.animate-spin]="isLoading" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        </button>
      </div>
    </header>

    <!-- Input Area -->
    <div class="mb-10 shadow-sm rounded-xl bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 transition-all duration-300 hover:shadow-md focus-within:ring-2 focus-within:ring-black dark:focus-within:ring-white flex flex-col sm:flex-row overflow-hidden">
      <div class="flex-1 flex items-center px-4 py-3 border-b sm:border-b-0 sm:border-r border-gray-100 dark:border-zinc-800/50 transition-colors duration-300">
        <svg class="w-5 h-5 text-gray-400 dark:text-zinc-500 mr-3 flex-shrink-0 transition-colors duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        <input 
          [(ngModel)]="newTodo.title"
          (keyup.enter)="addTodo()"
          type="text" 
          placeholder="What needs to be done?" 
          class="w-full bg-transparent border-none text-gray-900 dark:text-zinc-100 placeholder-gray-400 dark:placeholder-zinc-500 focus:outline-none text-sm font-medium transition-colors duration-300"
        >
      </div>
      <div class="flex-1 flex items-center px-4 py-3">
        <svg class="w-4 h-4 text-gray-400 dark:text-zinc-500 mr-3 flex-shrink-0 transition-colors duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
        </svg>
        <input 
          [(ngModel)]="newTodo.description"
          (keyup.enter)="addTodo()"
          type="text" 
          placeholder="Description (optional)" 
          class="w-full bg-transparent border-none text-gray-900 dark:text-zinc-100 placeholder-gray-400 dark:placeholder-zinc-500 focus:outline-none text-sm transition-colors duration-300"
        >
        <button 
          (click)="addTodo()"
          class="ml-3 flex-shrink-0 bg-black dark:bg-white text-white dark:text-black text-sm font-medium px-4 py-1.5 rounded-lg shadow-sm hover:opacity-90 transition-opacity focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black dark:focus:ring-white dark:focus:ring-offset-zinc-950">
          Add
        </button>
      </div>
    </div>

    <!-- Task List container -->
    <div class="space-y-3">
      
      <!-- Empty State -->
      <div *ngIf="!isLoading && todos.length === 0"
           class="text-center py-16 rounded-xl border border-dashed border-gray-300 dark:border-zinc-800 transition-colors duration-300">
        <div class="w-16 h-16 mx-auto mb-4 bg-gray-100 dark:bg-zinc-800/50 rounded-full flex items-center justify-center transition-colors duration-300">
          <svg class="w-8 h-8 text-gray-400 dark:text-zinc-500 transition-colors duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
          </svg>
        </div>
        <div class="text-lg font-semibold mb-1 text-gray-900 dark:text-zinc-100 transition-colors duration-300">No tasks yet</div>
        <div class="text-sm text-gray-500 dark:text-zinc-400 transition-colors duration-300">Add your first task above ✨</div>
      </div>

      <!-- Task Items -->
      <ng-container *ngFor="let todo of todos; trackBy: trackById">
        
        <!-- Task Card: Pending -->
        <div *ngIf="!todo.completed" class="group flex items-start sm:items-center justify-between p-4 bg-white dark:bg-zinc-900/80 rounded-xl border border-gray-200 dark:border-zinc-800/80 shadow-[0_2px_8px_rgba(0,0,0,0.04)] hover:shadow-[0_4px_12px_rgba(0,0,0,0.08)] transition-all duration-300 hover:-translate-y-0.5">
          <div class="flex items-start sm:items-center min-w-0 pr-4 w-full cursor-pointer" (click)="toggleCompleted(todo)">
            <button class="mt-0.5 sm:mt-0 flex-shrink-0 mr-4 w-5 h-5 rounded-full border-2 border-gray-300 dark:border-zinc-600 hover:border-black dark:hover:border-zinc-400 focus:outline-none transition-colors duration-300"></button>
            <div class="flex flex-col">
              <span class="text-sm font-medium text-gray-800 dark:text-zinc-200 transition-colors duration-300 break-words">{{ todo.title }}</span>
              <span *ngIf="todo.description" class="text-xs text-gray-500 dark:text-zinc-400 mt-1 transition-colors duration-300 break-words">{{ todo.description }}</span>
            </div>
          </div>
          
          <!-- Action Buttons (reveal on hover relative to the group) -->
          <div class="flex-shrink-0 flex items-center gap-1 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity duration-200 self-start sm:self-center">
            <button (click)="openEdit(todo); $event.stopPropagation()" class="p-1.5 text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors rounded-md focus:outline-none hover:bg-blue-50 dark:hover:bg-blue-900/30" aria-label="Edit">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
              </svg>
            </button>
            <button (click)="deleteTodo(todo.id); $event.stopPropagation()" class="p-1.5 text-gray-400 hover:text-red-600 dark:hover:text-red-400 transition-colors rounded-md focus:outline-none hover:bg-red-50 dark:hover:bg-red-900/30" aria-label="Delete">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Task Card: Completed -->
        <div *ngIf="todo.completed" class="group flex items-start sm:items-center justify-between p-4 bg-gray-100/50 dark:bg-zinc-900/30 rounded-xl border border-transparent shadow-[0_1px_3px_rgba(0,0,0,0.02)] transition-all duration-300">
          <div class="flex items-start sm:items-center min-w-0 pr-4 w-full opacity-60 cursor-pointer" (click)="toggleCompleted(todo)">
            <button class="mt-0.5 sm:mt-0 flex-shrink-0 mr-4 w-5 h-5 rounded-full border-none bg-black dark:bg-white text-white dark:text-black flex items-center justify-center focus:outline-none transition-colors duration-300">
              <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
              </svg>
            </button>
            <div class="flex flex-col">
              <span class="text-sm font-medium text-gray-500 dark:text-zinc-500 line-through transition-colors duration-300 break-words">{{ todo.title }}</span>
              <span *ngIf="todo.description" class="text-xs text-gray-400 dark:text-zinc-600 mt-1 line-through transition-colors duration-300 break-words">{{ todo.description }}</span>
            </div>
          </div>
          
          <!-- Action Buttons -->
          <div class="flex-shrink-0 flex items-center gap-1 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity duration-200 self-start sm:self-center">
            <button (click)="deleteTodo(todo.id); $event.stopPropagation()" class="p-1.5 text-gray-400 hover:text-red-600 dark:hover:text-red-400 transition-colors rounded-md focus:outline-none hover:bg-red-50 dark:hover:bg-red-900/30" aria-label="Delete">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        </div>

      </ng-container>
    </div>
  </main>

  <!-- Edit modal -->
  <div *ngIf="editingTodo" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-gray-900/40 dark:bg-black/60 backdrop-blur-sm transition-opacity" (click)="closeEdit()"></div>

    <div class="relative w-full max-w-lg rounded-2xl p-6 bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 shadow-2xl transform transition-all duration-300">

      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold tracking-tight text-gray-900 dark:text-zinc-100 transition-colors duration-300">Edit task</h3>
        <button (click)="closeEdit()"
                class="p-2 -mr-2 text-gray-400 hover:text-gray-600 dark:hover:text-zinc-300 rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors duration-300">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 dark:text-zinc-400 mb-1.5 uppercase tracking-wider transition-colors duration-300">Title</label>
          <input
            [(ngModel)]="editingTodo.title"
            class="w-full rounded-xl px-4 py-2.5 outline-none transition-colors duration-300 bg-gray-50 dark:bg-zinc-950 border border-gray-200 dark:border-zinc-800 focus:ring-2 focus:ring-black dark:focus:ring-white focus:border-transparent text-gray-900 dark:text-zinc-100"
          />
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 dark:text-zinc-400 mb-1.5 uppercase tracking-wider transition-colors duration-300">Description</label>
          <textarea
            [(ngModel)]="editingTodo.description"
            rows="3"
            class="w-full rounded-xl px-4 py-2.5 outline-none transition-colors duration-300 bg-gray-50 dark:bg-zinc-950 border border-gray-200 dark:border-zinc-800 focus:ring-2 focus:ring-black dark:focus:ring-white focus:border-transparent text-gray-900 dark:text-zinc-100 resize-none"
          ></textarea>
        </div>
      </div>

      <div class="mt-8 flex justify-end gap-3">
        <button
          (click)="closeEdit()"
          class="px-5 py-2.5 rounded-xl font-medium text-sm transition-colors duration-300 text-gray-600 dark:text-zinc-300 bg-transparent hover:bg-gray-100 dark:hover:bg-zinc-800"
        >
          Cancel
        </button>

        <button
          (click)="saveEdit()"
          class="px-5 py-2.5 rounded-xl font-medium text-sm text-white dark:text-black bg-black dark:bg-white hover:opacity-90 shadow-sm transition-opacity duration-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black dark:focus:ring-white dark:focus:ring-offset-zinc-900"
        >
          Save changes
        </button>
      </div>
    </div>
  </div>
</div>
